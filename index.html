<!DOCTYPE html>
<html lang="en">

<head>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#00c6ff">

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Nova Radio</title>

<link
rel="stylesheet"
href="styles.css">

<link
rel="preconnect"
href="https://de1.api.radio-browser.info">

</head>

<body>

<div
id="overlay"
class="overlay">

</div>

<aside
id="sidebar"
class="sidebar">

<div class="sidebar-header">

<h2>

🎧 Nova Radio

</h2>

<button
id="closeMenuButton">

✕

</button>

</div>

<div class="sidebar-content">

<div class="menu-group">

<button
id="favoritesToggle"
class="menu-button">

⭐

<span data-i18n="favorites">

Favorites

</span>

</button>


<div
id="favoritesDropdown"
class="favorites-dropdown hidden">

<div
id="favoritesList">

</div>

</div>

</div>

<div class="menu-group">

<h3
data-i18n="language">

Language

</h3>

<div class="language-buttons">

<button
id="englishButton"
class="language-button">

🇬🇧 English

</button>

<button
id="hungarianButton"
class="language-button">

🇭🇺 Magyar

</button>

</div>

</div>

<div class="menu-group">

<h3>

Nova Radio

</h3>

<p>

Version 2.0

</p>

</div>

</div>

</aside>

<div class="app">

<header class="header">

<div class="top-bar">

<button
id="menuButton"
class="menu-button">

☰

</button>

<h1>

🎧 Nova Radio

</h1>

</div>

<p
data-i18n="subtitle">

Modern Internet Radio Player

</p>

</header>

<section class="search-panel">

<div class="search-row">

<input

id="searchInput"

type="text"

placeholder="Search radio stations..."

>

<button

id="searchButton"

data-i18n="search">

Search

</button>

</div>

<div class="filter-row">

<select
id="countryFilter">

<option
value=""
data-i18n="allCountries">

All Countries

</option>

</select>

<select
id="genreFilter">

<option
value=""
data-i18n="allGenres">

All Genres

</option>

</select>

</div>

</section>

<section class="now-playing">

<div class="station-icon">

📻

</div>

<div class="station-info">

<h2
id="stationName">

No station selected

</h2>

<p
id="nowPlaying">

Nothing playing

</p>

<div
class="status-box">

<span
class="status-label"
data-i18n="status">

Status

</span>

<span
id="playerStatus"
class="status ready">

Ready

</span>

</div>

</div>

</section>

<section class="controls">

<button
id="playButton">

▶

<span
data-i18n="play">

Play

</span>

</button>

<button
id="pauseButton">

⏸

<span
data-i18n="pause">

Pause

</span>

</button>

<div
class="volume-control">

<span>

🔊

</span>

<input

id="volumeSlider"

type="range"

min="0"

max="1"

step="0.01"

value="0.7"

>

</div>

</section>

<section class="stations">

<div class="section-header">

<h2
data-i18n="stations">

Stations

</h2>

<div
id="loading"
class="hidden">

Loading...

</div>

</div>

<div
id="radioList"
class="radio-grid">

</div>

<button

id="loadMoreButton"

class="load-more-button"

data-i18n="loadMore">

Load More Stations

</button>

</section>

</div>

<audio
id="audioPlayer"
preload="none">

</audio>

<script src="translations.js"></script>

<script src="script.js"></script>

</body>

</html>
