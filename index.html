<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nova Radio Player</title>

<link rel="stylesheet" href="styles.css">

</head>


<body>

<div class="app">


<header class="header">

<h1>🎧 Nova Radio</h1>

<p>Internet Radio Player</p>

</header>




<section class="search-panel">


<div class="search-row">


<input
id="searchInput"
type="text"
placeholder="Search radio stations..."
>


<button id="searchButton">
Search
</button>


</div>



<div class="filter-row">


<select id="countryFilter">

<option value="">
All countries
</option>

</select>



<select id="genreFilter">

<option value="">
All genres
</option>

</select>


</div>


</section>





<section class="now-playing">


<div class="station-icon">

📻

</div>


<div class="station-details">


<h2 id="stationName">
No station selected
</h2>


<p id="nowPlaying">
Nothing playing
</p>


</div>


</section>





<section class="controls">


<button id="playButton">
▶ Play
</button>


<button id="pauseButton">
⏸ Pause
</button>



<div class="volume-control">


<span>
🔊
</span>


<input
id="volumeSlider"
type="range"
min="0"
max="1"
step="0.01"
value="0.7"
>


</div>


</section>





<section class="favorites-panel">


<div class="section-header">


<h2>
Favorites
</h2>


<button id="showFavoritesButton">
⭐ Show Favorites
</button>


</div>



<div id="favoritesList" class="radio-grid">

</div>


</section>





<section class="stations">


<div class="section-header">


<h2>
Stations
</h2>


<div id="loading" class="hidden">
Loading...
</div>


</div>



<div id="radioList" class="radio-grid">

</div>

<button id="loadMoreButton">
Load More Stations
</button>

</section>



</div>





<audio id="audioPlayer"></audio>



<script src="script.js"></script>


</body>

</html>
